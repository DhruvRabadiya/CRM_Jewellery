<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Token Receipt</title>
  <style>
    /* TSC TE244 · 80 mm thermal roll */
    @page { size: 80mm auto; margin: 2mm 1mm; }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 78mm;
      font-family: 'Courier New', Courier, monospace;
      font-size: 9px; color: #000; background: #fff; line-height: 1.35;
    }
    .c  { text-align: center; } .r { text-align: right; }
    .b  { font-weight: bold; }  .xs { font-size: 8px; }
    .sm { font-size: 8.5px; }   .lg { font-size: 11px; }
    .d-solid  { border-top: 1px solid #000; margin: 2.5px 0; }
    .d-dash   { border-top: 1px dashed #000; margin: 2.5px 0; }
    .d-double { border-top: 3px double #000; margin: 3px 0; }
    .d-star   { text-align: center; font-size: 8px; letter-spacing: 2px; margin: 2px 0; color: #333; }
    .shop     { font-size: 15px; font-weight: bold; letter-spacing: 2px; text-transform: uppercase; }
    .doc-type { font-size: 10px; font-weight: bold; letter-spacing: 3px; margin-top: 1px; }
    .bill-no  { font-size: 12px; font-weight: bold; margin-top: 2px; }
    .cust-block { background: #000; color: #fff; padding: 2px 4px; margin: 3px 0; font-size: 9.5px; font-weight: bold; letter-spacing: 0.5px; }
    table { width: 100%; border-collapse: collapse; font-size: 8.5px; }
    th { text-align: left; font-weight: bold; border-bottom: 1px solid #000; padding: 1px 1px; font-size: 8px; text-transform: uppercase; }
    th.r, td.r { text-align: right; } th.c, td.c { text-align: center; }
    td { padding: 1px 1px; vertical-align: top; }
    tr.total-row td { border-top: 1px solid #000; font-weight: bold; font-size: 9px; }
    .row { display: flex; justify-content: space-between; padding: 1px 0; font-size: 9px; }
    .row.grand { font-size: 10.5px; font-weight: bold; padding: 2px 0; }
    .due-box { border: 2px solid #000; padding: 3px 5px; margin: 4px 0 2px; display: flex; justify-content: space-between; align-items: center; }
    .due-label  { font-size: 9.5px; font-weight: bold; text-transform: uppercase; letter-spacing: 0.5px; }
    .due-amount { font-size: 14px; font-weight: bold; letter-spacing: 0.5px; }
    .footer { margin-top: 5px; text-align: center; font-size: 7.5px; color: #333; }
  </style>
</head>
<body>
  <div id="receipt"></div>
  <script>
    function fmt(n, d) { return (parseFloat(n)||0).toFixed(d===undefined?3:d); }
    function fmtMoney(n) {
      const v = parseFloat(n)||0;
      return 'Rs.' + v.toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g, ',');
    }
    function fmtDate(d) {
      if (!d) return '';
      try { return new Date(d).toLocaleDateString('en-IN',{day:'2-digit',month:'short',year:'numeric'}); }
      catch(_){ return d; }
    }

    function render(data) {
      const { shopName='Jewellery Shop', billNo, date, customerName='', customerPhone='',
              customerType='Retail', isRetail=true, products=[], items=[], summary={} } = data;
      const s = summary;
      let h = '';

      /* HEADER */
      h += `<div class="c">
        <div class="shop">${shopName}</div>
        <div class="doc-type">── ESTIMATE ──</div>
        <div class="bill-no">#${billNo}</div>
        <div class="sm">${fmtDate(date)}</div>
      </div>`;

      /* CUSTOMER */
      if (customerName)
        h += `<div class="cust-block">${customerName}${customerPhone ? '  '+customerPhone : ''}</div>`;
      else
        h += `<div class="d-solid"></div>`;

      /* ITEMS */
      products.forEach(metal => {
        const mi = items.filter(it => (it.metal_type||'Gold 24K') === metal);
        if (!mi.length) return;
        h += `<div class="b sm" style="margin:2px 0 1px;text-transform:uppercase;letter-spacing:1px;">${metal}</div>`;
        h += `<table><thead><tr>
          <th>Item</th><th class="c">Pcs</th><th class="r">Wt(g)</th><th class="r">LC</th>
        </tr></thead><tbody>`;
        let tP=0,tW=0,tL=0;
        mi.forEach(item => {
          const pcs=parseInt(item.pcs,10)||0;
          const wt=parseFloat(item.weight)||((parseFloat(item.size_value)||0)*pcs);
          const lc=parseFloat(item.t_lc)||((parseFloat(item.lc_pp)||0)*pcs);
          tP+=pcs; tW+=wt; tL+=lc;
          h += `<tr><td>${item.size_label||item.category||''}</td><td class="c">${pcs}</td><td class="r">${fmt(wt,3)}</td><td class="r">${fmt(lc,0)}</td></tr>`;
        });
        // Show per-metal total row if: multiple items in this metal, OR multiple metals (so each sub-total is readable)
        if (mi.length > 1 || products.length > 1)
          h += `<tr class="total-row"><td>Total</td><td class="c">${tP}</td><td class="r">${fmt(tW,3)}</td><td class="r">${fmt(tL,0)}</td></tr>`;
        h += '</tbody></table>';
      });

      h += `<div class="d-double"></div>`;

      /* TOTALS — grand total pcs/weight only shown when multiple metals exist
         (single-metal estimates already show the total inside the per-metal table above) */
      if (products.length > 1) {
        h += `<div class="row b"><span>Grand Total Pcs</span><span>${s.totalPcs||0} pcs</span></div>`;
        h += `<div class="row b"><span>Grand Total Wt</span><span>${fmt(s.totalWeight,3)} g</span></div>`;
      }

      /* LABOUR — shown for all customer types when labour exists, with size-wise breakdown */
      const labourItems = items.filter(it => (parseFloat(it.lc_pp)||0) > 0 && (parseInt(it.pcs,10)||0) > 0);
      const totalLabourCalc = labourItems.reduce((sum, it) => sum + (parseFloat(it.lc_pp)||0) * (parseInt(it.pcs,10)||0), 0);
      if (totalLabourCalc > 0) {
        h += `<div class="d-dash"></div>`;
        h += `<div class="b sm" style="text-transform:uppercase;letter-spacing:1px;margin:2px 0 1px;">Labour Charges</div>`;
        labourItems.forEach(item => {
          const pcs = parseInt(item.pcs,10)||0;
          const lc  = (parseFloat(item.lc_pp)||0) * pcs;
          h += `<div class="row xs"><span>${item.size_label||item.category||''} &times;${pcs}pc</span><span>${fmtMoney(lc)}</span></div>`;
        });
        h += `<div class="row b" style="border-top:1px solid #000;padding-top:2px;margin-top:1px;"><span>Total Labour</span><span>${fmtMoney(totalLabourCalc)}</span></div>`;
        if ((s.discount||0) > 0)
          h += `<div class="row"><span>Discount</span><span>- ${fmtMoney(s.discount)}</span></div>`;
      }

      /* METAL */
      const metals = Object.keys(s.requiredMetal||{}).filter(mt => (s.requiredMetal[mt]||0)>0||(s.metalReceived?.[mt]||0)>0);
      if (metals.length) {
        h += `<div class="d-dash"></div>`;
        metals.forEach(mt => {
          const needed=s.requiredMetal?.[mt]||0, received=s.metalReceived?.[mt]||0,
                due=s.metalDueUnsettled?.[mt]||0, settled=s.metalShortfallSettled?.[mt]||0,
                credit=s.metalCredit?.[mt]||0, rate=s.settlementRate?.[mt]||0;
          if (needed>0)   h+=`<div class="row"><span>${mt} Needed</span><span>${fmt(needed,3)}g</span></div>`;
          if (received>0) h+=`<div class="row"><span>${mt} Received</span><span>${fmt(received,3)}g</span></div>`;
          if (due>0)      h+=`<div class="row b"><span>${mt} Due</span><span>${fmt(due,3)}g</span></div>`;
          if (settled>0)  h+=`<div class="row xs"><span>&nbsp;&#8627; Settled Cash</span><span>${fmt(settled,3)}g</span></div>`;
          if (credit>0)   h+=`<div class="row"><span>${mt} Extra</span><span>${fmt(credit,3)}g</span></div>`;
          if (rate>0)     h+=`<div class="row xs"><span>&nbsp;Rate/10g</span><span>Rs.${Number(rate).toLocaleString('en-IN')}</span></div>`;
        });
      }

      /* PAYMENT */
      h += `<div class="d-dash"></div>`;
      if ((s.moneyPaid||0)>0)
        h+=`<div class="row"><span>Cash Received</span><span>${fmtMoney(s.moneyPaid)}</span></div>`;
      h+=`<div class="row grand"><span>Final Payable</span><span>${fmtMoney(s.totalAmount)}</span></div>`;

      /* AMOUNT DUE — prominent box */
      h+=`<div class="d-solid"></div>`;
      if ((s.amountGiven||0)>0) {
        h+=`<div class="due-box"><span class="due-label">Return to Customer</span><span class="due-amount">${fmtMoney(s.amountGiven)}</span></div>`;
      } else if ((s.refundDue||0)>0) {
        h+=`<div class="due-box"><span class="due-label">Cash Refund</span><span class="due-amount">${fmtMoney(s.refundDue)}</span></div>`;
      } else {
        h+=`<div class="due-box"><span class="due-label">Amount Due</span><span class="due-amount">${fmtMoney(s.cashDue||s.amountDue||0)}</span></div>`;
        Object.entries(s.metalDueUnsettled||{}).filter(([,v])=>v>0).forEach(([mt,v])=>{
          h+=`<div class="row b"><span>${mt} Still Owed</span><span>${fmt(v,3)}g</span></div>`;
        });
      }

      h+=`<div class="d-star">* * * * * * * * * * * * * * *</div>`;
      h+=`<div class="footer">Computer-generated estimate · ${shopName}</div>`;
      h+=`<div style="height:6mm;"></div>`;

      document.getElementById('receipt').innerHTML = h;
    }

    (function poll(){
      if (window.__ESTIMATE_DATA__) render(window.__ESTIMATE_DATA__);
      else setTimeout(poll, 30);
    })();
  </script>
</body>
</html>
